<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alpstay · Planning Reception</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Belleza&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#1b1712; --ink-2:#5a5244; --muted:#8c8475; --muted2:#aaa291;
  --paper:#ffffff; --wash:#faf8f3; --line:#e8e2d5; --line-2:#f1ede3;
  --gold:#b0883c; --gold-deep:#8a6824; --gold-soft:#f5edda; --gold-line:#e4d4ab;
  --red:#b23a2e; --red-bg:#f7e6e2; --red-row:#fbefec;
  --green:#3f7a4f; --green-bg:#e8f0e7;
  --grey:#5d5648; --grey-bg:#efece4;
  --gold-grad:linear-gradient(180deg,#dcbd7c 0%,#b88f44 55%,#9a6f28 100%);
  --display:'Belleza','Optima','Segoe UI',sans-serif;
  --body:'Lato',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;font-weight:400;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);font-weight:400;letter-spacing:.02em}

/* ---------- Topbar ---------- */
.topbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line)}
.topbar::after{content:"";display:block;height:3px;background:var(--gold-grad)}
.topbar .wrap{max-width:1180px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:14px 18px;flex-wrap:wrap}
.logo{height:52px;width:auto;display:block}
.brand-divider{width:1px;align-self:stretch;background:var(--gold-line);margin:2px 0}
.title-block{min-width:0}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep)}
.title-block h1{font-size:21px;margin:1px 0 0;color:var(--ink);letter-spacing:.04em}
.title-block .sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.topbar .spacer{flex:1}
.btn{font-family:var(--body);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--ink);border-radius:2px;padding:9px 16px;cursor:pointer;background:#fff;color:var(--ink);transition:.15s}
.btn:hover{background:var(--ink);color:#fff}
.btn.solid{background:var(--ink);color:#fff}
.btn.solid:hover{background:var(--gold-deep);border-color:var(--gold-deep)}
.btn.ghost{border-color:var(--gold-line);color:var(--gold-deep)}
.btn.ghost:hover{background:var(--gold-soft);color:var(--gold-deep)}
.btn:disabled{opacity:.4;cursor:not-allowed;background:#fff;color:var(--ink)}
.upd-msg{font-size:12px;font-weight:700;color:var(--green);white-space:nowrap;align-self:center}
.cloud-status{font-size:11.5px;font-weight:700;color:var(--muted);white-space:nowrap;align-self:center;letter-spacing:.02em}
.cloud-status.ok{color:var(--green)} .cloud-status.err{color:var(--red)} .cloud-status.muted{color:var(--muted2)} .cloud-status.busy{color:var(--gold-deep)}
.drop-overlay{position:fixed;inset:0;z-index:60;background:rgba(27,23,18,.5);display:none;align-items:center;justify-content:center;pointer-events:none}
.drop-overlay.show{display:flex}
.do-inner{background:#fff;border:2px dashed var(--gold);border-radius:8px;padding:38px 54px;text-align:center;font-size:18px;color:var(--ink);box-shadow:0 24px 70px rgba(0,0,0,.3)}
.do-ico{font-size:46px;margin-bottom:12px}

/* ---------- Tabs ---------- */
.tabs{position:sticky;top:81px;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
.tabs .wrap{max-width:1180px;margin:0 auto;padding:0 12px;display:flex;gap:0;overflow-x:auto}
.tab{appearance:none;border:none;background:none;font-family:var(--body);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:13px 6px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px;flex:1 1 0;min-width:0}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab .ico-t{font-size:13px}
.tab .cnt{font-size:10.5px;background:var(--gold-soft);color:var(--gold-deep);border-radius:20px;padding:1px 6px;font-weight:700;letter-spacing:.02em;font-variant-numeric:tabular-nums}
.tab.active .cnt{background:var(--gold);color:#fff}
.searchwrap{display:flex;align-items:center;gap:9px;max-width:1180px;margin:0 auto;padding:9px 16px 11px;border-top:1px solid var(--line-2)}
.search-ico{font-size:13px;opacity:.6}
#searchBox{flex:1;min-width:0;font-family:var(--body);font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:3px;padding:9px 13px;background:var(--wash);outline:none}
#searchBox:focus{border-color:var(--gold);background:#fff}
#searchBox::placeholder{color:var(--muted2)}
.search-count{font-size:12px;font-weight:700;color:var(--gold-deep);white-space:nowrap;font-variant-numeric:tabular-nums}

main{max-width:1180px;margin:0 auto;padding:26px 22px 90px}

/* ---------- Dropzone ---------- */
.drop{border:1px dashed var(--gold-line);border-radius:4px;background:var(--wash);padding:54px 24px;text-align:center;transition:.15s;cursor:pointer;max-width:660px;margin:64px auto}
.drop:hover,.drop.hover{background:var(--gold-soft);border-color:var(--gold)}
.drop-logo{display:inline-block;line-height:0;transition:opacity .15s}
.drop-logo:hover{opacity:.78}
.drop-logo img{height:104px;width:auto}
.logo-link{display:inline-flex;text-decoration:none;line-height:0}
.wa-bar{display:flex;gap:11px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.wa-bar .btn{text-transform:none;letter-spacing:.02em}
.wa-msg{font-size:12.5px;color:var(--green);font-weight:700}
.wa-prev{width:100%;margin-top:2px}
.wa-prev summary{font-size:11px;color:var(--muted);cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.wa-prev pre{white-space:pre-wrap;font-family:var(--body);font-size:12.5px;color:var(--ink-2);background:var(--wash);border:1px solid var(--line);border-radius:3px;padding:13px 15px;margin-top:9px;line-height:1.5}
.drop h2{margin:18px 0 7px;font-size:24px;color:var(--ink);letter-spacing:.03em}
.drop p{margin:0;color:var(--ink-2)}
.drop .hint{margin-top:18px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.err{max-width:660px;margin:16px auto 0;background:var(--red-bg);color:var(--red);border:1px solid #e3b3ac;border-radius:3px;padding:12px 15px;font-size:13.5px;font-weight:700}

/* ---------- Report shell ---------- */
.report{display:none}
.report.active{display:block}
.report-head{margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.report-head h2{margin:0;font-size:26px;color:var(--ink);letter-spacing:.03em;display:flex;align-items:center;gap:12px}
.report-head h2::before{content:"";width:5px;height:24px;background:var(--gold-grad);border-radius:1px;flex:0 0 5px}
.report-head .lead{color:var(--muted);font-size:13px;margin-top:6px;margin-left:17px}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid var(--line);border-top:2px solid var(--gold);border-radius:3px;padding:16px 18px}
.kpi .n{font-family:var(--display);font-size:34px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.kpi .l{font-size:11px;color:var(--muted);margin-top:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.kpi.accent{background:var(--ink);border-color:var(--ink);border-top:2px solid var(--gold)}
.kpi.accent .n{color:#e7c987}
.kpi.accent .l{color:#c9bfa6}
.kpi.warn .n{color:var(--gold-deep)} .kpi.red .n{color:var(--red)} .kpi.green .n{color:var(--green)}

.alertbar{background:var(--wash);border:1px solid var(--line);border-radius:3px;padding:17px 19px;margin-bottom:22px}
.alertbar h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-deep);font-family:var(--body);font-weight:700}
.alertbar .row{display:flex;flex-wrap:wrap;gap:9px}

/* ---------- Consiglio / Notice ---------- */
.tip{background:var(--gold-soft);border:1px solid var(--gold-line);border-left:4px solid var(--gold);border-radius:3px;padding:16px 18px;margin-bottom:22px;break-inside:avoid}
.tip h3{margin:0 0 9px;font-size:17px;color:var(--gold-deep);letter-spacing:.02em}
.tip ul{margin:0;padding-left:18px}
.tip li{font-size:13.5px;margin:6px 0;line-height:1.45}
.tip-foot{margin-top:11px;font-size:12.5px;color:var(--ink-2)}
.notice{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);border-radius:3px;padding:16px 18px;margin-bottom:22px;break-inside:avoid}
.notice h3{margin:0 0 7px;font-size:17px;letter-spacing:.02em}
.notice .nrow{font-size:13px;margin-top:9px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.notice .nrow b{margin-right:3px}
.crit-t{color:var(--red)} .muted-t{color:var(--muted2)}

/* ---------- Group ---------- */
.group{margin-bottom:30px}
.group-head{display:flex;align-items:center;gap:12px;margin:0 0 13px;padding-bottom:9px;border-bottom:1px solid var(--gold-line)}
.group-head .gname{font-family:var(--display);font-size:20px;letter-spacing:.02em}
.group-head .gtag{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:#e7c987;padding:3px 11px;border-radius:2px}
.group-head .grooms{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ---------- Room card ---------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:3px;overflow:hidden;display:flex;break-inside:avoid}
.spine{width:5px;flex:0 0 5px;background:var(--green)}
.spine.crit{background:var(--red)} .spine.warn{background:var(--gold)} .spine.ok{background:var(--green)}
.card-body{padding:14px 16px;flex:1;min-width:0}
.card-top{display:flex;align-items:baseline;gap:11px;margin-bottom:3px}
.rno{font-family:var(--display);font-size:28px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.02em}
.rmeta{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rmeta .dot{color:var(--gold-line);margin:0 5px}
.guest{font-size:15px;font-weight:700;margin:6px 0 2px;color:var(--ink)}
.pax{font-size:12.5px;color:var(--muted)}
.bedline{margin:11px 0 3px;padding:9px 11px;background:var(--wash);border:1px solid var(--line-2);border-radius:3px;font-size:13px}
.bedline .bl-k{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-deep);font-weight:700}
.bedline .bl-v{font-weight:700;margin-top:3px;color:var(--ink)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:2px;display:inline-flex;align-items:center;gap:5px;line-height:1.6;letter-spacing:.01em}
.chip.crit{background:var(--red-bg);color:var(--red)}
.chip.warn{background:var(--gold-soft);color:var(--gold-deep)}
.chip.bed{background:#fff;border:1px solid var(--gold-line);color:var(--gold-deep)}
.chip.info{background:var(--grey-bg);color:var(--grey)}
.chip.ok{background:var(--green-bg);color:var(--green)}
.chip.muted{background:var(--line-2);color:var(--muted)}
.badge-new{display:inline-flex;align-items:center;font-size:9.5px;font-weight:900;letter-spacing:.12em;color:#fff;background:var(--gold-grad);border-radius:3px;padding:2px 6px;margin-left:7px;vertical-align:middle;box-shadow:0 1px 2px rgba(0,0,0,.18);text-transform:uppercase}
details.note{margin-top:10px}
details.note summary{font-size:11px;color:var(--muted2);cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
details.note .nbody{font-size:12px;color:var(--ink-2);white-space:pre-wrap;margin-top:7px;padding:9px;background:var(--wash);border-radius:3px;line-height:1.45}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:3px;overflow:hidden}
th,td{text-align:left;padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--line-2);vertical-align:top}
th{background:#fff;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-deep);font-weight:700;border-bottom:2px solid var(--gold)}
tbody tr:nth-child(even){background:var(--wash)}
tbody tr:hover{background:var(--gold-soft)}
tr:last-child td{border-bottom:none}
td.rn,td.num{font-weight:700;font-variant-numeric:tabular-nums}
td.rn{font-size:15px;color:var(--ink)}
tr.collected td,tr.collected:hover td{background:var(--green-bg)}
tr.topay td,tr.topay:hover td{background:var(--red-row)}
.totrow td,.totrow:hover td{font-weight:900;background:var(--ink);color:#e7c987;border-bottom:none}

/* ---------- Tag groups ---------- */
.taggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px}
.tagcard{background:#fff;border:1px solid var(--line);border-radius:3px;padding:14px 16px;break-inside:avoid}
.tagcard.empty{opacity:.45}
.tagcard h4{margin:0;font-size:16px;display:flex;align-items:center;gap:8px;letter-spacing:.01em}
.tagcard .tc-n{font-size:11.5px;color:#fff;background:var(--muted);border-radius:20px;padding:1px 9px;font-weight:700;margin-left:auto;font-variant-numeric:tabular-nums}
.tagcard.hi h4 .tc-n{background:var(--red)}
.tagcard.at h4 .tc-n{background:var(--gold)}
.tagrooms{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.troom{font-size:12.5px;font-weight:700;background:var(--wash);border:1px solid var(--line);border-radius:2px;padding:3px 9px;font-variant-numeric:tabular-nums}
.troom small{font-weight:400;color:var(--muted);margin-left:5px;font-variant-numeric:normal}

/* ---------- Housekeeping summary ---------- */
.hk-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:12px;margin-bottom:22px}
.hk{background:#fff;border:1px solid var(--line);border-top:2px solid var(--gold-line);border-radius:3px;padding:14px 16px;text-align:center}
.hk .n{font-family:var(--display);font-size:30px;color:var(--ink);font-variant-numeric:tabular-nums}
.hk .l{font-size:10.5px;color:var(--muted);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.hk.add .n{color:var(--gold-deep)} .hk.rem .n{color:var(--red)}

.empty-state{text-align:center;color:var(--muted);padding:54px 20px;font-size:14px;background:var(--wash);border:1px solid var(--line);border-radius:3px}
.legend{font-size:11.5px;color:var(--muted);margin-top:20px;display:flex;flex-wrap:wrap;gap:16px}
.legend b{color:var(--ink)}

@media print{
  @page{margin:11mm}
  .no-print{display:none!important}
  body{background:#fff;font-size:11.5px}
  .topbar{position:static} .topbar::after{height:3px}
  main{padding:0;max-width:none}
  .report{display:none!important} .report.active{display:block!important}
  .card,.tagcard,.kpi,.hk,table,.alertbar,.tip,.notice{break-inside:avoid}
  .cards{grid-template-columns:repeat(2,1fr)}
  tbody tr:hover{background:inherit}
  *{ -webkit-print-color-adjust:exact;print-color-adjust:exact }
}
@media(max-width:560px){ .title-block .sub{display:none} .cards{grid-template-columns:1fr} .logo{height:38px} }
@media(max-width:680px){
  main{padding:18px 12px 70px}
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .report-head h2{font-size:21px}
}
</style>
</head>

/* =================== HELPER =================== */
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=s=>{const v=parseInt(String(s).replace(/[^\d-]/g,''),10);return isNaN(v)?0:v;};
const roomNum=a=>{const m=String(a).match(/\d+/);return m?m[0]:'';};
const roomSort=(a,b)=>(parseInt(roomNum(a))||9999)-(parseInt(roomNum(b))||9999);
function parsePrice(s){if(!s)return 0;let t=String(s).replace(/[^\d.,-]/g,'');t=t.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.');const v=parseFloat(t);return isNaN(v)?0:v;}

/* =================== TAG & NOTE =================== */
function parseFlags(tag,note){
  const tl=(tag||'').toLowerCase(),nl=(note||'').toLowerCase(),all=((tag||'')+' '+(note||'')).toLowerCase();
  return {
    elaborato:/tutto elaborato/.test(tl),
    cane:/\bcane\b|\bdog\b/.test(all),
    skipass:/ski\s?pass/.test(all),
    parcheggio:/parcheggio|garage|posto auto|parking/.test(all),
    bus:/bus\s?ticket|\bbus\b/.test(tl),
    documenti:/docum/.test(tl),
    no3rdBed:/no\s*3\.?\s*letto|no 3rd|niente 3/.test(all),
    gruppo:/gruppo|group/.test(all),
    twin:/twin|letti separati|separate beds|2 single|due letti singoli|letti singoli/.test(nl),
    colazione:/colazione|breakfast/.test(nl),
    menu:/menu|mezza pensione|half board|\bhb\b|pensione completa|cena inclusa/.test(nl),
    celiaco:/celiac|gluten|glutine|coeliac/.test(nl),
    balconeReq:/balcon/.test(all),
  };
}

/* =================== LETTI =================== */
function planBeds(rn,pax,f){
  const room=ROOMS[rn];const type=room?room.type:'Doppia';const twin=f.twin,no3=f.no3rdBed;
  let config='',extra=0,remove=0,twinSet=false,castelli=0;const actions=[];
  if(type==='Doppia'){ config=twin?'2 letti singoli (twin)':'1 matrimoniale'; if(twin){twinSet=true;actions.push({k:'bed',t:'Preparare letti separati (twin)'});} }
  else if(type==='Tripla'){
    if(pax>=3&&!no3){ config=twin?'2 letti singoli + 1 letto aggiunto':'Matrimoniale + 1 letto aggiunto'; extra=1; if(twin){twinSet=true;actions.push({k:'bed',t:'Letti separati (twin)'});} }
    else { config=twin?'2 letti singoli':'1 matrimoniale'; remove=1; actions.push({k:'rem',t:no3?'NO 3° letto (tag): non mettere l\'aggiunto':'Tripla con '+pax+' ospiti: TOGLIERE il letto aggiunto'}); if(twin){twinSet=true;actions.push({k:'bed',t:'Letti separati (twin)'});} }
  } else if(type==='Quadrupla'){
    if(room&&room.special==='291'){
      if(pax>=4){config='Matrimoniale + 1 letto a castello';castelli=1;}
      else if(pax===3){config='Matrimoniale + 1 letto a castello';castelli=1;actions.push({k:'bed',t:'291 con 3 ospiti: matrimoniale + castello (1 posto libero)'});}
      else {config='1 matrimoniale';remove=1;actions.push({k:'rem',t:'291 con 2 ospiti: TOGLIERE il letto a castello'});}
    } else {
      if(pax>=4){config='2 letti a castello';castelli=2;}
      else if(pax===3){config='2 letti a castello — togliere 1 posto';castelli=2;remove=1;actions.push({k:'rem',t:'Quadrupla con 3 ospiti: TOGLIERE 1 letto'});}
      else {config='1 letto a castello (togliere l\'altro)';castelli=1;remove=2;actions.push({k:'rem',t:'Quadrupla con 2 ospiti: TOGLIERE 2 letti'});}
    }
  } else config=pax+' posti';
  return {config,actions,extra,remove,twinSet,castelli,type};
}

/* =================== PARSING EXCEL =================== */
function parseSheet(rows,kind){
  let h=-1;
  for(let i=0;i<rows.length;i++){ if((rows[i]||[]).some(c=>String(c).trim().toLowerCase()==='conto')){h=i;break;} }
  if(h<0) return [];
  const col={}; rows[h].forEach((c,idx)=>col[String(c).trim().toLowerCase()]=idx);
  const g=(r,k)=>{const i=col[k];return i==null?'':String(r[i]??'').trim();};
  const out=[];
  for(let i=h+1;i<rows.length;i++){ const r=rows[i]||[]; const conto=String(r[col['conto']]??'').trim(); if(!conto.startsWith('#'))continue;
    if(kind==='extra') out.push({conto,alloggio:g(r,'alloggio'),descrizione:g(r,'descrizione'),prenotante:g(r,'prenotante'),ospite:g(r,'ospite principale'),tipoExtra:g(r,'tipo'),qta:g(r,'quantità')||g(r,'quantita'),prezzo:g(r,'prezzo unitario')});
    else out.push({conto,stato:g(r,'stato'),tipo:g(r,'tipologia alloggio'),alloggio:g(r,'alloggio'),prenotante:g(r,'prenotante'),ospite:g(r,'ospite principale'),adulti:num(g(r,'adulti')),bambini:num(g(r,'bambini')),neonati:num(g(r,'neonati')),agenzia:g(r,'agenzia'),tag:g(r,'tag'),note:g(r,'note')});
  }
  return out;
}
function parseWorkbook(wb){
  const data={arrivi:[],partenze:[],soggiorno:[],extra:[],exportInfo:''};
  wb.SheetNames.forEach(n=>{
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:false,defval:''});
    const l=n.toLowerCase();
    if(!data.exportInfo){ for(const row of rows.slice(0,2)){ for(const c of row){ if(/esportato/i.test(String(c))){data.exportInfo=String(c).trim();break;} } if(data.exportInfo)break; } }
    if(/arriv/.test(l))data.arrivi=parseSheet(rows,'mov');
    else if(/parten/.test(l))data.partenze=parseSheet(rows,'mov');
    else if(/soggior/.test(l))data.soggiorno=parseSheet(rows,'mov');
    else if(/extra/.test(l))data.extra=parseSheet(rows,'extra');
  });
  return data;
}

/* =================== ENRICH =================== */
function enrich(r,extraByConto){
  const rn=roomNum(r.alloggio);
  const room=ROOMS[rn]||null;
  const pax=r.adulti+r.bambini;
  const f=parseFlags(r.tag,r.note);
  const bp=planBeds(rn,pax,f);
  const balconyMM=f.balconeReq&&room&&!room.balcony;
  const extras=(extraByConto[r.conto]||[]);
  const crit=balconyMM;
  const hasAttn=f.cane||f.skipass||f.parcheggio||f.bus||f.celiaco||f.twin||r.neonati>0||bp.actions.length||extras.length;
  const status=crit?'crit':(hasAttn?'warn':'ok');
  return {...r,rn,room,pax,f,bp,balconyMM,extras,status};
}
function buildChips(e){
  const c=[];
  if(e.stayOn){ if(e.stayOn.same) c.push({lvl:'info',t:'🔁 Si ferma · stessa stanza'}); else c.push({lvl:'crit',t:`🔁 CAMBIO CAMERA · da ${e.stayOn.from} a ${e.stayOn.to}`}); }
  if(e.f.elaborato) c.push({lvl:'ok',t:'✓ Tutto elaborato'});
  if(e.balconyMM) c.push({lvl:'crit',t:'⚠ Richiesto balcone — stanza SENZA'});
  if(e.f.cane) c.push({lvl:'warn',t:'🐕 Cane'});
  if(e.f.skipass) c.push({lvl:'warn',t:'🎿 Skipass'});
  if(e.f.parcheggio) c.push({lvl:'warn',t:'🅿 Parcheggio'});
  if(e.f.celiaco) c.push({lvl:'warn',t:'🥗 Celiaco'});
  if(e.f.bus) c.push({lvl:'info',t:'🚌 Bus ticket'});
  if(e.f.documenti) c.push({lvl:'info',t:'📄 Documenti OK'});
  if(e.f.twin) c.push({lvl:'info',t:'🛏 Letti separati'});
  if(e.neonati>0) c.push({lvl:'info',t:'👶 Neonato — culla?'});
  e.bp.actions.forEach(a=>c.push({lvl:a.k==='rem'?'warn':'bed',t:(a.k==='rem'?'➖ ':'➕ ')+a.t}));
  e.extras.forEach(x=>{const tot=parsePrice(x.prezzo)*num(x.qta);c.push({lvl:e.f.elaborato?'muted':'crit',t:'€ '+esc(x.descrizione)+' ('+tot.toFixed(2)+'€)'+(e.f.elaborato?' · risulta pagato':' · DA INCASSARE')});});
  return c;
}
const chipHtml=c=>`<span class="chip ${c.lvl}">${esc(c.t)}</span>`;
const newBadge=e=>(e&&e.isNew)?'<span class="badge-new">NEW</span>':'';

/* ---- Lista letti per WhatsApp ---- */
function hasBedAction(e){ return e.bp.actions.length>0 || (e.stayOn && !e.stayOn.same); }
function gName(x){ return x?(x.ospite&&x.ospite!=='-'?x.ospite:x.prenotante):''; }
function computeHK(){
  const depBy={}, arrBy={};
  ENR.partenze.forEach(d=>{ if(d.rn) depBy[d.rn]=d; });
  ENR.arrivi.forEach(a=>{ if(a.rn) arrBy[a.rn]=a; });
  const rooms=[...new Set([...Object.keys(depBy),...Object.keys(arrBy)])];
  const items=[];
  rooms.forEach(rn=>{
    const dep=depBy[rn], arr=arrBy[rn];
    const out=/check-?out/i.test(dep?dep.stato:'');
    const room=(arr&&arr.room)||(dep&&dep.room)||null;
    const type=room?room.type:(arr?arr.tipo:(dep?dep.tipo:''));
    const rem=arr?arr.bp.actions.filter(a=>a.k==='rem').map(a=>'➖ '+a.t):[];
    const cfg=arr?`${arr.bp.config}${rem.length?' · '+rem.join(' · '):''}`:'';
    const who=(gName(arr)+' '+gName(dep)).trim();
    const skey=(rn+' '+who).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    let it=null;
    if(arr && arr.stayOn && arr.stayOn.same){
      it={kind:'fermata',label:'FERMATA · non liberare',detail:`Si ferma: ${arr.stayOn.who} — rifresco, lascia i letti`};
    } else if(arr && arr.stayOn && !arr.stayOn.same){
      it={kind:'cambio',label:`CAMBIO CAMERA · arriva da ${arr.stayOn.from}`,detail:`${cfg} — ${arr.stayOn.who}`};
    } else if(dep && out){
      it=arr ? {kind:'vialibera',label:'PARTITI · rifare per arrivo',detail:cfg}
             : {kind:'vialibera',label:'PARTITI · rifare stanza',detail:'Pulizia, nessun nuovo arrivo'};
    } else if(arr && hasBedAction(arr)){
      it={kind:'azione',label:(dep&&!out)?'AZIONE LETTO · attendere partenza':'AZIONE LETTO',detail:cfg};
    }
    if(it){ it.rn=rn; it.type=type; it.room=room; it.search=skey; it.isNew=(arr&&arr.isNew)||(dep&&dep.isNew); items.push(it); }
  });
  items.sort((a,b)=>(parseInt(a.rn)||9999)-(parseInt(b.rn)||9999));
  return items;
}
const HK_EMOJI={vialibera:'🟢',fermata:'🛑',cambio:'🔁',azione:'🛏'};
function expStamp(){ return (((DATA.exportInfo||'').match(/(\d{1,2}[:.]\d{2})/)||[,''])[1]) || new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }
function buildWaBeds(){
  const items=computeHK();
  const date=((DATA.exportInfo||'').match(/(\d{1,2}\s+[a-zàèéìòù]+\s+\d{4})/i)||[,''])[1];
  const time=expStamp();
  const c={vialibera:0,fermata:0,cambio:0,azione:0}; items.forEach(i=>c[i.kind]++);
  const L=['*ALPSTAY · SASLONG*','🛏 *LETTI – HOUSEKEEPING*'+(date?' '+date:'')+'  ·  aggiornata alle ore '+time,''];
  L.push(`🟢 Partiti: ${c.vialibera}  ·  🛑 Fermate: ${c.fermata}  ·  🔁 Cambi: ${c.cambio}  ·  🛏 Azioni: ${c.azione}`);
  if(!items.length){ L.push(''); L.push('Nessuna stanza da segnalare.'); return L.join('\n'); }
  const byFloor={};
  items.forEach(e=>{const f=e.room?e.room.floor:'Altre stanze';(byFloor[f]=byFloor[f]||[]).push(e);});
  Object.keys(byFloor).forEach(f=>{
    L.push(''); L.push(`*${f.toUpperCase()}*`);
    byFloor[f].forEach(e=>L.push(`${e.isNew?'🆕 ':''}${HK_EMOJI[e.kind]} ${e.rn} ${e.type} — ${e.label}${e.detail?': '+e.detail:''}`));
  });
  return L.join('\n');
}
function copyText(t,msgEl){
  const ok=()=>{ if(msgEl){msgEl.textContent='Lista copiata ✓';setTimeout(()=>msgEl.textContent='',2600);} };
  const fail=()=>{ if(msgEl)msgEl.textContent='Copia non riuscita — usa l\'anteprima'; };
  const fb=()=>{ try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();const r=document.execCommand('copy');document.body.removeChild(ta);r?ok():fail();}catch(e){fail();} };
  if(navigator.clipboard&&window.isSecureContext){ navigator.clipboard.writeText(t).then(ok,fb); } else fb();
}
function waSendBeds(){ window.open('https://web.whatsapp.com/send?text='+encodeURIComponent(buildWaBeds()),'_blank'); }
function copyBeds(){ copyText(buildWaBeds(),document.getElementById('waMsg')); }

/* =================== RENDER =================== */
function tabCount(id){
  if(!ENR)return '';
  if(id==='dash')return '';
  if(id.startsWith('arr'))return ENR.arrivi.length;
  if(id==='dep-extra')return ENR.depExtras.length;
  if(id.startsWith('dep'))return ENR.partenze.length;
  if(id==='stay')return ENR.soggiorno.length;
  return '';
}
function renderTabs(){
  document.getElementById('tabsWrap').innerHTML=TABS.map(t=>{
    const c=tabCount(t.id);
    return `<button class="tab ${t.id===ACTIVE?'active':''}" data-tab="${t.id}" title="${t.label}"><span class="ico-t">${t.icon}</span> ${t.label}${c!==''?`<span class="cnt">${c}</span>`:''}</button>`;
  }).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ACTIVE=b.dataset.tab;renderTabs();renderReports();applySearch();window.scrollTo(0,0);});
}

let SEARCH='';
function searchKey(e){ return (e.rn+' '+(e.ospite||'')+' '+(e.prenotante||'')).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function applySearch(){
  const q=(SEARCH||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const tokens=q.split(/\s+/).filter(Boolean);
  const active=document.querySelector('.report.active');
  const cnt=document.getElementById('searchCount');
  if(!active){ if(cnt)cnt.textContent=''; return; }
  const items=active.querySelectorAll('[data-search]');
  let shown=0;
  items.forEach(el=>{
    const ok=!tokens.length||tokens.every(t=>el.getAttribute('data-search').includes(t));
    el.style.display=ok?'':'none';
    if(ok)shown++;
  });
  active.querySelectorAll('.group').forEach(g=>{
    const vis=[...g.querySelectorAll('[data-search]')].some(el=>el.style.display!=='none');
    g.style.display=vis?'':'none';
  });
  active.querySelectorAll('.tagcard').forEach(tc=>{
    const tr=tc.querySelectorAll('.troom[data-search]');
    if(tr.length){ tc.style.display=[...tr].some(el=>el.style.display!=='none')?'':'none'; }
  });
  if(cnt) cnt.textContent = (tokens.length && items.length) ? `${shown} trovati` : '';
}

function sum(arr,fn){return arr.reduce((s,x)=>s+fn(x),0);}

function renderReports(){
  const wrap=document.getElementById('reports');
  if(!ENR){wrap.innerHTML='';return;}
  wrap.innerHTML=[rDash(),rArrRoom(),rArrAz(),rArrTag(),rArrBed(),rDepExtra(),rDepRoom(),rStay()].join('');
  document.querySelectorAll('.report').forEach(r=>r.classList.toggle('active',r.dataset.r===ACTIVE));
}

/* ---- Riepilogo ---- */
function rDash(){
  const a=ENR.arrivi,p=ENR.partenze,s=ENR.soggiorno;
  const occ=a.length+s.length;
  const gruppiMap={}; a.forEach(e=>{gruppiMap[e.prenotante]=(gruppiMap[e.prenotante]||0)+1;});
  const gruppi=Object.values(gruppiMap).filter(n=>n>1).length;
  const balMM=[...a,...p,...s].filter(e=>e.balconyMM).length;
  const incasso=ENR.depExtras.filter(e=>!e.f.elaborato).reduce((t,e)=>t+e.extras.reduce((x,k)=>x+parsePrice(k.prezzo)*num(k.qta),0),0)
               +ENR.soggiorno.filter(e=>e.extras.length&&!e.f.elaborato).reduce((t,e)=>t+e.extras.reduce((x,k)=>x+parsePrice(k.prezzo)*num(k.qta),0),0);
  const cani=a.filter(e=>e.f.cane).length, ski=a.filter(e=>e.f.skipass).length;
  const inPartenza=p.filter(e=>/in partenza/i.test(e.stato)).length;
  const addBeds=sum(a,e=>e.bp.extra), remBeds=sum(a,e=>e.bp.remove);
  const alerts=[];
  const cambi=a.filter(e=>e.stayOn&&!e.stayOn.same).length, fermi=a.filter(e=>e.stayOn&&e.stayOn.same).length;
  if(cambi)alerts.push(chipHtml({lvl:'crit',t:`🔁 ${cambi} cambi camera`}));
  if(fermi)alerts.push(chipHtml({lvl:'info',t:`🔁 ${fermi} si fermano (stessa stanza)`}));
  if(balMM)alerts.push(chipHtml({lvl:'crit',t:`⚠ ${balMM} conflitti balcone`}));
  if(inPartenza)alerts.push(chipHtml({lvl:'warn',t:`🚪 ${inPartenza} partenze non ancora in check-out`}));
  if(incasso>0)alerts.push(chipHtml({lvl:'warn',t:`💶 ${incasso.toFixed(2)}€ extra da incassare`}));
  if(cani)alerts.push(chipHtml({lvl:'warn',t:`🐕 ${cani} cani in arrivo`}));
  if(ski)alerts.push(chipHtml({lvl:'warn',t:`🎿 ${ski} skipass`}));
  if(remBeds)alerts.push(chipHtml({lvl:'warn',t:`➖ ${remBeds} letti da togliere`}));
  if(!alerts.length)alerts.push(chipHtml({lvl:'ok',t:'Nessun alert: tutto regolare'}));
  // consiglio upgrade quadruple -> 2 doppie, se ci sono doppie libere stanotte
  const occupied=new Set(); a.forEach(e=>occupied.add(e.rn)); s.forEach(e=>occupied.add(e.rn));
  const freeDoubles=Object.keys(ROOMS).filter(rn=>ROOMS[rn].type==='Doppia'&&!occupied.has(rn))
    .sort((x,y)=>((ROOMS[y].balcony?1:0)-(ROOMS[x].balcony?1:0))||(parseInt(x)-parseInt(y)));
  const quads=a.filter(e=>(e.room?e.room.type:e.tipo)==='Quadrupla'&&e.pax>=3);
  let tip='';
  if(quads.length&&freeDoubles.length>=2){
    const items=quads.map(e=>{const who=e.ospite&&e.ospite!=='-'?e.ospite:e.prenotante;return `<li><b>Stanza ${esc(e.rn)}</b> — ${esc(who)}, ${e.pax} ospiti in quadrupla (letti a castello): valuta di proporre <b>due camere doppie</b>.</li>`;}).join('');
    const ex=freeDoubles.slice(0,8).map(rn=>rn+(ROOMS[rn].balcony?'':'*')).join(', ');
    tip=`<div class="tip"><h3>💡 Consiglio · upgrade quadruple</h3>
      <ul>${items}</ul>
      <div class="tip-foot">Doppie libere stanotte (${freeDoubles.length}): ${esc(ex)}${freeDoubles.length>8?'…':''} &nbsp;·&nbsp; <span class="muted-t">* senza balcone</span></div></div>`;
  }
  return `<section class="report" data-r="dash">
    <div class="report-head"><div><h2>Riepilogo di giornata</h2><div class="lead">${esc(DATA.exportInfo||'')}</div></div></div>
    <div class="kpis">
      <div class="kpi accent"><div class="n">${occ}</div><div class="l">Stanze occupate stanotte</div></div>
      <div class="kpi"><div class="n">${a.length}</div><div class="l">Arrivi · ${sum(a,e=>e.pax)} ospiti</div></div>
      <div class="kpi"><div class="n">${p.length}</div><div class="l">Partenze · ${sum(p,e=>e.pax)} ospiti</div></div>
      <div class="kpi"><div class="n">${s.length}</div><div class="l">In soggiorno · ${sum(s,e=>e.pax)} ospiti</div></div>
      <div class="kpi"><div class="n">${gruppi}</div><div class="l">Gruppi in arrivo</div></div>
      <div class="kpi ${incasso?'warn':''}"><div class="n">${incasso.toFixed(0)}€</div><div class="l">Extra da incassare</div></div>
    </div>
    <div class="alertbar"><h3>Alert del giorno</h3><div class="row">${alerts.join('')}</div></div>
    ${tip}
    <div class="legend"><span><b>Spina rossa</b> = conflitto da risolvere (es. balcone)</span><span><b>Oro</b> = attenzione (cane, skipass, letti, extra)</span><span><b>Verde</b> = nessuna attenzione</span></div>
  </section>`;
}

/* ---- Arrivi stanza per stanza, raggruppati per prenotante ---- */
function rArrRoom(){
  const groups={};
  ENR.arrivi.forEach(e=>{(groups[e.prenotante||'—']=groups[e.prenotante||'—']||[]).push(e);});
  const keys=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length||a.localeCompare(b));
  const body=keys.map(k=>{
    const list=groups[k].slice().sort((x,y)=>roomSort(x.alloggio,y.alloggio));
    const rooms=list.map(e=>roomNum(e.alloggio)).join(', ');
    const isGroup=list.length>1;
    return `<div class="group">
      <div class="group-head"><span class="gname">${esc(k)}</span>${isGroup?`<span class="gtag">GRUPPO · ${list.length} camere</span>`:''}<span class="grooms">${esc(rooms)}</span></div>
      <div class="cards">${list.map(roomCard).join('')}</div>
    </div>`;
  }).join('');
  return `<section class="report" data-r="arr-room">
    <div class="report-head"><div><h2>Arrivi · stanza per stanza</h2><div class="lead">Raggruppati per prenotante · alert e letti evidenziati per camera</div></div></div>
    ${ENR.arrivi.length?body:'<div class="empty-state">Nessun arrivo.</div>'}
  </section>`;
}
function roomCard(e){
  const r=e.room;
  const meta=r?`${esc(r.type)}<span class="dot">·</span>${r.balcony?'balcone':(r.view||'senza balcone')}${r.comunicante?'<span class="dot">·</span>comunicante':''}<span class="dot">·</span>${esc(r.floor)}`:`${esc(e.tipo)}<span class="dot">·</span><span style="color:var(--red)">stanza non in anagrafica</span>`;
  const chips=buildChips(e).map(chipHtml).join('');
  const guest=e.ospite&&e.ospite!=='-'?e.ospite:e.prenotante;
  const note=e.note&&e.note!=='-'?`<details class="note"><summary>Note complete</summary><div class="nbody">${esc(e.note)}</div></details>`:'';
  return `<div class="card" data-search="${esc(searchKey(e))}"><div class="spine ${e.status}"></div><div class="card-body">
    <div class="card-top"><span class="rno">${esc(e.rn||'?')}</span>${newBadge(e)}<span class="rmeta">${meta}</span></div>
    <div class="guest">${esc(guest)}</div>
    <div class="pax">${e.adulti} adulti${e.bambini?` · ${e.bambini} bambini`:''}${e.neonati?` · ${e.neonati} neonati`:''}${e.stato?` · ${esc(e.stato)}`:''}</div>
    <div class="bedline"><div class="bl-k">Letti da preparare</div><div class="bl-v">${esc(e.bp.config)}</div></div>
    <div class="chips">${chips}</div>${note}
  </div></div>`;
}

/* ---- Arrivi in ordine alfabetico del prenotante ---- */
function rArrAz(){
  const list=ENR.arrivi.slice().sort((a,b)=>(a.prenotante||'').localeCompare(b.prenotante||'','it',{sensitivity:'base'})||roomSort(a.alloggio,b.alloggio));
  const rows=list.map(e=>{
    const chips=buildChips(e).filter(c=>c.lvl!=='ok').map(chipHtml).join(' ')||'<span style="color:var(--muted2)">—</span>';

  return `<section class="report" data-r="arr-az">

    ${list.length?`<table><thead><tr><th>Prenotante</th><th>Ospite</th><th>Stanza</th><th>Tipo</th><th>Pax</th><th>Letti</th><th>Attenzioni</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty-state">Nessun arrivo.</div>'}

/* ---- Arrivi letti / housekeeping ---- */

  const items=computeHK();
  const c={vialibera:0,fermata:0,cambio:0,azione:0}; items.forEach(i=>c[i.kind]++);
  const cls={vialibera:'collected',fermata:'topay',cambio:'',azione:''};
  const chip={vialibera:'ok',fermata:'crit',cambio:'warn',azione:'warn'};
  const rows=items.map(e=>`<tr class="${cls[e.kind]}" data-search="${esc(e.search)}"><td class="rn">${esc(e.rn)}${newBadge(e)}</td><td>${esc(e.type)}</td><td><span class="chip ${chip[e.kind]}">${HK_EMOJI[e.kind]} ${esc(e.label)}</span></td><td>${esc(e.detail)}</td></tr>`).join('');
  const table=items.length
    ? `<table><thead><tr><th>Stanza</th><th>Tipo</th><th>Stato housekeeping</th><th>Dettaglio / letti</th></tr></thead><tbody>${rows}</tbody></table>`
    : `<div class="empty-state">Nessuna stanza da segnalare al housekeeping al momento.</div>`;
  return `<section class="report" data-r="arr-bed">
    <div class="report-head"><div><h2>Arrivi · letti (housekeeping)</h2><div class="lead">Aggiornato alle ore ${esc(expStamp())} · 🟢 Partiti ${c.vialibera} · 🛑 Fermate ${c.fermata} · 🔁 Cambi camera ${c.cambio} · 🛏 Azioni letto ${c.azione}</div></div></div>
    <div class="wa-bar no-print">
      <button class="btn solid" onclick="waSendBeds()">📲 Invia su WhatsApp</button>
      <button class="btn" onclick="copyBeds()">Copia lista</button>
      <span class="wa-msg" id="waMsg"></span>
      <details class="wa-prev"><summary>Anteprima testo</summary><pre>${esc(buildWaBeds())}</pre></details>
    </div>
    ${table}
  </section>`;
}

/* ---- Partenze · solo extra da pagare ---- */
function rDepExtra(){
  const list=ENR.depExtras.slice().sort((x,y)=>roomSort(x.alloggio,y.alloggio));
  let tot=0;
  const rows=list.map(e=>e.extras.map(x=>{
    const t=parsePrice(x.prezzo)*num(x.qta); const pay=!e.f.elaborato; if(pay)tot+=t;
    return `<tr class="${pay?'topay':'collected'}" data-search="${esc(searchKey(e))}"><td class="rn">${esc(roomNum(e.alloggio))}${newBadge(e)}</td><td>${esc(e.ospite&&e.ospite!=='-'?e.ospite:e.prenotante)}</td><td>${esc(x.descrizione)}</td><td class="num">${esc(x.qta)}</td><td class="num">${parsePrice(x.prezzo).toFixed(2)}€</td><td class="num">${t.toFixed(2)}€</td><td><span class="chip ${pay?'crit':'ok'}">${pay?'DA INCASSARE':'risulta pagato'}</span></td></tr>`;
  }).join('')).join('');
  return `<section class="report" data-r="dep-extra">
    <div class="report-head"><div><h2>Partenze · extra da pagare</h2><div class="lead">"Tutto elaborato" = già pagato. Senza il tag → da incassare al check-out.</div></div></div>
    ${list.length?`<table><thead><tr><th>Stanza</th><th>Ospite</th><th>Extra</th><th>Q.tà</th><th>Prezzo</th><th>Totale</th><th>Stato</th></tr></thead><tbody>${rows}<tr class="totrow"><td colspan="5">DA INCASSARE</td><td class="num">${tot.toFixed(2)}€</td><td></td></tr></tbody></table>`:'<div class="empty-state">Nessun extra sulle partenze di oggi.</div>'}
  </section>`;
}

/* ---- Partenze · per stanza crescente ---- */
function rDepRoom(){
  const list=ENR.partenze.slice().sort((x,y)=>roomSort(x.alloggio,y.alloggio));
  const rows=list.map(e=>{
    const done=/check-out/i.test(e.stato);
    const extraTot=e.extras.reduce((t,x)=>t+parsePrice(x.prezzo)*num(x.qta),0);
    const pay=extraTot>0&&!e.f.elaborato;
    const chips=[];
    if(e.stayOn)chips.push(e.stayOn.same?'<span class="chip info">🔁 si ferma · stessa stanza (non parte)</span>':`<span class="chip crit">🔁 si sposta → stanza ${esc(e.stayOn.to)}</span>`);
    if(!e.f.documenti)chips.push('<span class="chip crit">📄 Documento da ritirare</span>');
    if(!done)chips.push('<span class="chip warn">🚪 ancora dentro</span>');
    if(pay)chips.push(`<span class="chip crit">💶 ${extraTot.toFixed(2)}€ da incassare</span>`);
    else if(extraTot>0)chips.push(`<span class="chip muted">extra ${extraTot.toFixed(2)}€ · pagato</span>`);
    return `<tr class="${pay||!e.f.documenti?'topay':''}" data-search="${esc(searchKey(e))}"><td class="rn">${esc(roomNum(e.alloggio))}${newBadge(e)}</td><td>${esc(e.ospite&&e.ospite!=='-'?e.ospite:e.prenotante)}</td><td>${esc(e.room?e.room.type:e.tipo)}</td><td>${esc(e.stato)}</td><td>${chips.join(' ')||'<span style="color:var(--muted2)">—</span>'}</td></tr>`;
  }).join('');
  return `<section class="report" data-r="dep-room">
    <div class="report-head"><div><h2>Partenze · per stanza</h2><div class="lead">Ordine crescente di numero stanza · evidenziate quelle ancora dentro o con extra</div></div></div>
    ${list.length?`<table><thead><tr><th>Stanza</th><th>Ospite</th><th>Tipo</th><th>Stato</th><th>Attenzioni</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty-state">Nessuna partenza.</div>'}
  </section>`;
}

/* ---- In soggiorno ---- */
function rStay(){
  const list=ENR.soggiorno.slice().sort((x,y)=>roomSort(x.alloggio,y.alloggio));
  const body=list.map(roomCard).join('');
  return `<section class="report" data-r="stay">
    <div class="report-head"><div><h2>In soggiorno</h2><div class="lead">Ospiti già presenti · tag, richieste speciali ed extra a conto</div></div></div>
    ${list.length?`<div class="cards">${body}</div>`:'<div class="empty-state">Nessun ospite in soggiorno.</div>'}
  </section>`;
}

/* =================== LOAD =================== */
function normName(s){
  if(!s)return '';
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').trim().split(/\s+/).filter(Boolean).sort().join(' ');
}
function detectStayOns(ENR){
  // nomi prenotante troppo frequenti = gruppi/agenzie, da escludere dal match individuale
  const cnt={};
  [...ENR.arrivi,...ENR.partenze].forEach(e=>{const n=normName(e.prenotante);if(n)cnt[n]=(cnt[n]||0)+1;});
  const keysOf=e=>{const ks=new Set();[e.ospite,e.prenotante].forEach(raw=>{const n=normName(raw);if(n&&(cnt[n]||0)<=2)ks.add(n);});return ks;};
  ENR.partenze.forEach(d=>{d._keys=keysOf(d);d.stayOn=null;});
  ENR.arrivi.forEach(a=>{
    a.stayOn=null; const ak=keysOf(a); if(!ak.size)return;
    const d=ENR.partenze.find(p=>p._keys.size&&[...ak].some(k=>p._keys.has(k)));
    if(d){
      const from=roomNum(d.alloggio),to=roomNum(a.alloggio),same=from===to;
      a.stayOn={from,to,same,who:(a.ospite&&a.ospite!=='-'?a.ospite:a.prenotante)};
      d.stayOn={from,to,same};
    }
  });
}
function hkKey(r){ return (r.conto||'')+'¦'+(r.alloggio||''); }
function hkSig(r){ return [r.stato||'',r.adulti||0,r.bambini||0,r.tag||''].join('¦'); }
function cloudSig(d){ if(!d)return''; const n=k=>Array.isArray(d[k])?d[k].length:(d[k]?Object.keys(d[k]).length:0); return (d.exportInfo||'')+'¦'+n('arrivi')+'-'+n('partenze')+'-'+n('soggiorno')+'-'+n('extra'); }
const asArr=x=>Array.isArray(x)?x:(x?Object.values(x):[]);
window.cloudReceive=function(raw){
  if(!raw)return;
  const data={arrivi:asArr(raw.arrivi),partenze:asArr(raw.partenze),soggiorno:asArr(raw.soggiorno),extra:asArr(raw.extra),exportInfo:raw.exportInfo||''};
  if(!data.arrivi.length&&!data.partenze.length&&!data.soggiorno.length)return;
  if(cloudSig(data)===LASTSIG)return;
  process(data,!!ENR,true);
};
function process(data,keepView,fromCloud){
  const prev={};
  if(ENR){ ['arrivi','partenze','soggiorno'].forEach(k=>ENR[k].forEach(r=>{ prev[hkKey(r)]=hkSig(r); })); }
  const extraByConto={};
  data.extra.forEach(x=>{(extraByConto[x.conto]=extraByConto[x.conto]||[]).push(x);});
  ENR={
    arrivi:data.arrivi.map(r=>enrich(r,extraByConto)),
    partenze:data.partenze.map(r=>enrich(r,extraByConto)),
    soggiorno:data.soggiorno.map(r=>enrich(r,extraByConto)),
  };
  detectStayOns(ENR);
  ENR.depExtras=ENR.partenze.filter(e=>e.extras.length>0);
  let newCount=0;
  const isUpdate=Object.keys(prev).length>0;
  ['arrivi','partenze','soggiorno'].forEach(k=>ENR[k].forEach(r=>{
    r.isNew = isUpdate && (!(hkKey(r) in prev) || prev[hkKey(r)]!==hkSig(r));
    if(r.isNew)newCount++;
  }));
  DATA=data;
  document.getElementById('exportInfo').textContent=data.exportInfo||'File caricato';
  document.getElementById('dropArea').style.display='none';
  document.getElementById('tabs').style.display='block';
  document.getElementById('printBtn').disabled=false;
  document.getElementById('reloadBtn').style.display='inline-flex';
  document.getElementById('updateBtn').style.display='inline-flex';
  if(!keepView){ ACTIVE='dash'; SEARCH=''; const sb=document.getElementById('searchBox'); if(sb)sb.value=''; }
  renderTabs();renderReports();applySearch();
  if(keepView){
    const um=document.getElementById('updMsg');
    if(um){ const t=expStamp();
      um.textContent='Aggiornato alle '+t+(isUpdate?(newCount?' · '+newCount+' novità':' · nessuna novità'):'')+' ✓'; setTimeout(()=>{um.textContent='';},6000); }
  }
  LASTSIG=cloudSig(data);
  if(!fromCloud && window.cloudPush){ try{ window.cloudPush(data); }catch(e){ console.error(e); } }
}
function showErr(m){const el=document.getElementById('err');el.textContent=m;el.style.display='block';}
function handleFile(file,keepView){
  document.getElementById('err').style.display='none';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const data=parseWorkbook(wb);
      if(!data.arrivi.length&&!data.partenze.length&&!data.soggiorno.length){ showErr('Non trovo i fogli Arrivi / Partenze / In soggiorno. Assicurati che sia l\'export giornaliero di Slope.'); return; }
      process(data,keepView);
    }catch(e){ console.error(e); showErr('Non riesco a leggere il file ('+e.message+'). Deve essere un .xls o .xlsx esportato da Slope.'); }
  };
  reader.onerror=()=>showErr('Errore nella lettura del file.');
  reader.readAsArrayBuffer(file);
}

/* =================== UI WIRING =================== */
const drop=document.getElementById('drop'),input=document.getElementById('fileInput');
const dropOverlay=document.getElementById('dropOverlay');
drop.onclick=()=>input.click();
input.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('hover');}));
// Drag & drop globale: a dati caricati il rilascio AGGIORNA in loco; altrimenti carica
let dragDepth=0;
const hasFiles=e=>e.dataTransfer&&[...(e.dataTransfer.types||[])].includes('Files');
window.addEventListener('dragenter',e=>{ if(!hasFiles(e))return; dragDepth++; if(ENR)dropOverlay.classList.add('show'); });
window.addEventListener('dragleave',e=>{ if(!hasFiles(e))return; dragDepth--; if(dragDepth<=0){dragDepth=0;dropOverlay.classList.remove('show');} });
window.addEventListener('dragover',e=>{ if(hasFiles(e))e.preventDefault(); });
window.addEventListener('drop',e=>{ e.preventDefault(); dragDepth=0; dropOverlay.classList.remove('show'); const f=e.dataTransfer&&e.dataTransfer.files[0]; if(f)handleFile(f,!!ENR); });
document.getElementById('printBtn').onclick=()=>window.print();
document.getElementById('searchBox').addEventListener('input',e=>{SEARCH=e.target.value;applySearch();});
const updateInput=document.getElementById('updateInput');
document.getElementById('updateBtn').onclick=()=>updateInput.click();
updateInput.onchange=e=>{ if(e.target.files[0])handleFile(e.target.files[0],true); updateInput.value=''; };
document.getElementById('reloadBtn').onclick=()=>{
  DATA=ENR=null;SEARCH='';
  const sb=document.getElementById('searchBox'); if(sb)sb.value='';
  document.getElementById('dropArea').style.display='block';
  document.getElementById('tabs').style.display='none';
  document.getElementById('reports').innerHTML='';
  document.getElementById('printBtn').disabled=true;
  document.getElementById('reloadBtn').style.display='none';
  document.getElementById('updateBtn').style.display='none';
  document.getElementById('updMsg').textContent='';
  document.getElementById('exportInfo').textContent='Nessun file caricato';
  input.value='';
};
</script>
<script type="module">
// ===== Firebase Realtime Database (sync planning reception ⇄ housekeeping) =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6lFBRjf_9VwZUga6ERV85l2bJ8uQWHEc",
  authDomain: "dailylistsas.firebaseapp.com",
  // ⬇️ INSERISCI QUI l'URL esatto del tuo Realtime Database (Console Firebase → Realtime Database, in alto).
  // Esempi: "https://dailylistsas-default-rtdb.europe-west1.firebasedatabase.app"  oppure  "https://dailylistsas-default-rtdb.firebaseio.com"
  databaseURL: "https://dailylistsas-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dailylistsas",
  storageBucket: "dailylistsas.firebasestorage.app",
  messagingSenderId: "606032311628",
  appId: "1:606032311628:web:50400f4939fe11c7ea8be9"
};

const setStatus=(txt,cls)=>{ const el=document.getElementById('cloudStatus'); if(el){ el.textContent=txt; el.className='cloud-status no-print '+(cls||''); } };

try{
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const planRef = ref(db, 'planning/current');

  // Login anonimo (best-effort): necessario solo se usi regole con auth != null.
  try{ signInAnonymously(getAuth(app)).catch(()=>{}); }catch(e){}

  // Salvataggio sul cloud (chiamato dall'app dopo ogni caricamento/aggiornamento)
  window.cloudPush = (data)=>{
    setStatus('☁︎ Salvataggio…','busy');
    set(planRef, {
      exportInfo: data.exportInfo||'',
      arrivi: data.arrivi||[], partenze: data.partenze||[],
      soggiorno: data.soggiorno||[], extra: data.extra||[],
      updatedAt: Date.now()
    }).then(()=>setStatus('☁︎ Salvato sul cloud','ok'))
      .catch(err=>{ console.error(err); setStatus('☁︎ Salvataggio non riuscito','err'); });
  };

  // Ricezione realtime: quando un altro dispositivo aggiorna, l'app si aggiorna da sola
  onValue(planRef, snap=>{
    const data = snap.val();
    if(data){ setStatus('☁︎ Sincronizzato','ok'); if(window.cloudReceive) window.cloudReceive(data); }
    else { setStatus('☁︎ Cloud vuoto · carica un file','muted'); }
  }, err=>{ console.error(err); setStatus('☁︎ Cloud non accessibile (regole/URL)','err'); });

  setStatus('☁︎ Cloud connesso','ok');
}catch(e){
  console.error('Firebase init', e);
  setStatus('☁︎ Cloud non configurato','err');
}
</script>
